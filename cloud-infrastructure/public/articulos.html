<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recursos y Análisis — AHC Intelligence</title>
  <link rel="icon" type="image/png" href="logoqahc.png" />
  <style>
    :root {
      --navy:      #ffffff;
      --navy-mid:  #f4f6f9;
      --navy-lite: #e8ecf2;
      --border:    #d0d8e4;
      --accent:    #1a56a0;
      --accent-h:  #1464bf;
      --text:      #1a2535;
      --text-dim:  #3a5068;
      --text-head: #040d18;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .inner { max-width: 1280px; margin: 0 auto; width: 100%; }

    /* HEADER */
    header { background: var(--navy-mid); border-bottom: 2px solid var(--accent); padding: 0 48px; height: 64px; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .auth-bar { display: flex; align-items: center; gap: 14px; font-size: 0.95rem; color: var(--text-dim); }
    .btn { padding: 9px 22px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .creditos-badge { display: none; padding: 4px 12px; background: var(--navy-lite); border: 1px solid var(--border); border-radius: 20px; font-size: 0.8rem; font-weight: 700; }

    /* HERO */
    .hero { border-bottom: 1px solid var(--border); padding: 44px 48px 36px; background: linear-gradient(180deg, #eaf0f8 0%, var(--navy) 100%); }
    .hero-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .hero-title { font-size: 2rem; font-weight: 700; color: var(--text-head); }
    .hero-desc { font-size: 0.95rem; color: var(--text-dim); margin-top: 10px; line-height: 1.7; }

    /* FILTROS */
    .filtros-wrap { padding: 24px 48px 0; }
    .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
    .filtro-btn { padding: 6px 16px; border: 1.5px solid var(--border); border-radius: 20px; background: transparent; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); cursor: pointer; transition: all .15s; font-family: inherit; }
    .filtro-btn:hover, .filtro-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* GRID ARTÍCULOS */
    .articulos-wrap { padding: 36px 48px 56px; flex: 1; }
    .articulos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .art-card { background: var(--navy-mid); border: 1px solid var(--border); border-top: 3px solid var(--accent); padding: 28px 24px; display: flex; flex-direction: column; gap: 12px; text-decoration: none; transition: background .2s, border-color .2s; }
    .art-card:hover { background: var(--navy-lite); border-color: var(--accent-h); }
    .art-tag { font-size: 0.68rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    .art-titulo { font-size: 1.05rem; font-weight: 700; color: var(--text-head); line-height: 1.4; }
    .art-resumen { font-size: 0.85rem; color: var(--text-dim); line-height: 1.7; flex: 1; }
    .art-fecha { font-size: 0.72rem; color: #7a90a4; }
    .art-link { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
    .art-link::after { content: ' →'; }

    /* LOADER */
    .loader-txt { text-align: center; padding: 60px; color: var(--text-dim); font-size: 0.9rem; }

    /* WHATSAPP */
    .wa-float { position: fixed; bottom: 28px; right: 28px; width: 54px; height: 54px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37,211,102,.45); z-index: 8000; text-decoration: none; transition: transform .2s; }
    .wa-float:hover { transform: scale(1.08); }
    .wa-float svg { width: 28px; height: 28px; fill: #fff; }

    @media (max-width: 768px) {
      header { padding: 0 16px; height: 52px; }
      #user-info { display: none !important; }
      .btn { padding: 7px 14px; font-size: 0.82rem; }
      .hero { padding: 20px 16px; }
      .hero-title { font-size: 1.3rem; }
      .filtros-wrap { padding: 16px 16px 0; }
      .articulos-wrap { padding: 20px 16px 40px; }
      .articulos-grid { grid-template-columns: 1fr; gap: 12px; }
      .wa-float { bottom: 16px; right: 16px; width: 48px; height: 48px; }
      .wa-float svg { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">
      <img src="logoqahc.png?v=2" alt="AHC Intelligence" style="height:40px;object-fit:contain;display:block;" />
    </a>
    <div class="auth-bar">
      <span id="user-info"></span>
      <span id="creditos-badge" class="creditos-badge"></span>
      <button id="btn-login" class="btn btn-primary" onclick="loginGoogle()">Registrate gratis</button>
      <button id="btn-logout" class="btn btn-secondary" style="display:none" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="hero">
    <div class="inner">
      <div class="hero-label">AHC Intelligence</div>
      <div class="hero-title">Recursos y Análisis</div>
      <div class="hero-desc">Artículos sobre compliance, due diligence, contratos y mercados financieros para asesores latinoamericanos.</div>
    </div>
  </div>

  <div class="filtros-wrap">
    <div class="inner">
      <div class="filtros" id="filtros-wrap">
        <button class="filtro-btn active" onclick="filtrar(this, '')">Todos</button>
        <button class="filtro-btn" onclick="filtrar(this, 'Compliance')">Compliance</button>
        <button class="filtro-btn" onclick="filtrar(this, 'Due Diligence')">Due Diligence</button>
        <button class="filtro-btn" onclick="filtrar(this, 'Contratos')">Contratos</button>
        <button class="filtro-btn" onclick="filtrar(this, 'Mercados')">Mercados</button>
        <button class="filtro-btn" onclick="filtrar(this, 'Regulación')">Regulación</button>
      </div>
    </div>
  </div>

  <div class="articulos-wrap">
    <div class="inner">
      <div id="articulos-loader" class="loader-txt">Cargando artículos...</div>
      <div id="articulos-grid" class="articulos-grid" style="display:none"></div>
    </div>
  </div>

  <a href="https://wa.me/59894032474?text=Hola,%20me%20interesa%20AHC%20Intelligence" target="_blank" rel="noopener" class="wa-float">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="app.js"></script>
  <script>
    var _todosArticulos = [];
    var _tagActivo = "";

    function _fmtFecha(ts) {
      if (!ts) return "";
      return new Date(ts.seconds * 1000).toLocaleDateString("es-AR", { year: "numeric", month: "long", day: "numeric" });
    }

    function _renderGrid(articulos) {
      var grid = document.getElementById("articulos-grid");
      if (!articulos.length) {
        grid.innerHTML = '<p style="color:#3a5068;text-align:center;padding:60px 0;grid-column:1/-1">No hay artículos en esta categoría todavía.</p>';
        grid.style.display = "grid";
        return;
      }
      grid.innerHTML = articulos.map(function(a) {
        return '<a class="art-card" href="articulo.html?id=' + a.id + '">'
          + '<div class="art-tag">' + escHtml(a.tag || "General") + '</div>'
          + '<div class="art-titulo">' + escHtml(a.titulo) + '</div>'
          + (a.resumen ? '<div class="art-resumen">' + escHtml(a.resumen) + '</div>' : '')
          + (a.creado_en ? '<div class="art-fecha">' + _fmtFecha(a.creado_en) + '</div>' : '')
          + '<div class="art-link">Leer artículo</div>'
          + '</a>';
      }).join("");
      grid.style.display = "grid";
    }

    function filtrar(btn, tag) {
      document.querySelectorAll(".filtro-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      _tagActivo = tag;
      var filtrados = tag ? _todosArticulos.filter(function(a) { return a.tag === tag; }) : _todosArticulos;
      _renderGrid(filtrados);
    }

    (function cargarArticulos() {
      db.collection("articulos")
        .where("publicado", "==", true)
        .orderBy("creado_en", "desc")
        .get()
        .then(function(snap) {
          document.getElementById("articulos-loader").style.display = "none";
          _todosArticulos = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
          _renderGrid(_todosArticulos);
        })
        .catch(function(e) {
          document.getElementById("articulos-loader").textContent = "Error al cargar los artículos. Recargá la página.";
          console.warn("[ARTICULOS]", e);
        });
    })();
  </script>
</body>
</html>
