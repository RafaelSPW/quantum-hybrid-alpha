<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artículo — AHC Intelligence</title>
  <link rel="icon" type="image/png" href="logoqahc.png" />
  <style>
    :root {
      --navy:      #ffffff;
      --navy-mid:  #f4f6f9;
      --navy-lite: #e8ecf2;
      --border:    #d0d8e4;
      --accent:    #1a56a0;
      --accent-h:  #1464bf;
      --text:      #1a2535;
      --text-dim:  #3a5068;
      --text-head: #040d18;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .inner { max-width: 1280px; margin: 0 auto; width: 100%; }

    /* HEADER */
    header { background: var(--navy-mid); border-bottom: 2px solid var(--accent); padding: 0 48px; height: 64px; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .auth-bar { display: flex; align-items: center; gap: 14px; font-size: 0.95rem; color: var(--text-dim); }
    .btn { padding: 9px 22px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .creditos-badge { display: none; padding: 4px 12px; background: var(--navy-lite); border: 1px solid var(--border); border-radius: 20px; font-size: 0.8rem; font-weight: 700; }

    /* BREADCRUMB */
    .breadcrumb { padding: 16px 48px; border-bottom: 1px solid var(--border); background: var(--navy-mid); font-size: 0.78rem; color: var(--text-dim); }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { margin: 0 6px; }

    /* ARTÍCULO */
    .art-wrap { max-width: 760px; margin: 0 auto; padding: 52px 48px 80px; flex: 1; }
    .art-tag { font-size: 0.68rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
    .art-titulo { font-size: 2rem; font-weight: 700; color: var(--text-head); line-height: 1.25; margin-bottom: 16px; }
    .art-resumen { font-size: 1.05rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 10px; }
    .art-meta { font-size: 0.75rem; color: #7a90a4; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }

    /* CONTENIDO GENERADO */
    .art-contenido h2 { font-size: 1.2rem; font-weight: 700; color: var(--text-head); margin: 32px 0 12px; }
    .art-contenido p  { font-size: 0.97rem; color: var(--text-dim); line-height: 1.85; margin-bottom: 16px; }
    .art-contenido strong { color: var(--text); }
    .art-contenido ul, .art-contenido ol { margin: 0 0 16px 20px; }
    .art-contenido li { font-size: 0.97rem; color: var(--text-dim); line-height: 1.75; margin-bottom: 6px; }
    .art-contenido a { color: var(--accent); }

    /* CTA al final */
    .art-cta { margin-top: 52px; padding: 28px 32px; background: var(--navy-mid); border: 1px solid var(--border); border-left: 4px solid var(--accent); }
    .art-cta p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 14px; }
    .art-cta-btns { display: flex; gap: 12px; flex-wrap: wrap; }

    /* LOADER */
    .loader-txt { text-align: center; padding: 80px; color: var(--text-dim); font-size: 0.9rem; }

    /* WHATSAPP */
    .wa-float { position: fixed; bottom: 28px; right: 28px; width: 54px; height: 54px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37,211,102,.45); z-index: 8000; text-decoration: none; transition: transform .2s; }
    .wa-float:hover { transform: scale(1.08); }
    .wa-float svg { width: 28px; height: 28px; fill: #fff; }

    @media (max-width: 768px) {
      header { padding: 0 16px; height: 52px; }
      #user-info { display: none !important; }
      .btn { padding: 7px 14px; font-size: 0.82rem; }
      .breadcrumb { padding: 12px 16px; }
      .art-wrap { padding: 28px 16px 56px; }
      .art-titulo { font-size: 1.4rem; }
      .wa-float { bottom: 16px; right: 16px; width: 48px; height: 48px; }
      .wa-float svg { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">
      <img src="logoqahc.png?v=2" alt="AHC Intelligence" style="height:40px;object-fit:contain;display:block;" />
    </a>
    <div class="auth-bar">
      <span id="user-info"></span>
      <span id="creditos-badge" class="creditos-badge"></span>
      <button id="btn-login" class="btn btn-primary" onclick="loginGoogle()">Registrate gratis</button>
      <button id="btn-logout" class="btn btn-secondary" style="display:none" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="breadcrumb">
    <div class="inner">
      <a href="index.html">Inicio</a><span>›</span>
      <a href="articulos.html">Recursos y Análisis</a><span>›</span>
      <span id="bc-titulo">Artículo</span>
    </div>
  </div>

  <div class="inner">
    <div id="art-loader" class="loader-txt">Cargando artículo...</div>
    <div id="art-body" class="art-wrap" style="display:none">
      <div id="art-tag" class="art-tag"></div>
      <h1 id="art-titulo" class="art-titulo"></h1>
      <div id="art-resumen" class="art-resumen"></div>
      <div id="art-meta" class="art-meta"></div>
      <div id="art-contenido" class="art-contenido"></div>
      <div class="art-cta">
        <p>¿Querés aplicar este análisis a tu cartera de clientes? AHC Intelligence te da las herramientas de due diligence, compliance y mercados en un solo panel.</p>
        <div class="art-cta-btns">
          <button class="btn btn-primary" onclick="loginGoogle()">Registrate gratis</button>
          <a href="articulos.html" class="btn btn-secondary">Ver más artículos</a>
        </div>
      </div>
    </div>
  </div>

  <a href="https://wa.me/59894032474?text=Hola,%20me%20interesa%20AHC%20Intelligence" target="_blank" rel="noopener" class="wa-float">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="app.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      if (!id) { window.location.href = "articulos.html"; return; }

      db.collection("articulos").doc(id).get().then(function(doc) {
        if (!doc.exists || !doc.data().publicado) {
          window.location.href = "articulos.html";
          return;
        }
        var d = doc.data();
        document.title = d.titulo + " — AHC Intelligence";

        var fecha = d.creado_en
          ? new Date(d.creado_en.seconds * 1000).toLocaleDateString("es-AR", { year: "numeric", month: "long", day: "numeric" })
          : "";

        document.getElementById("bc-titulo").textContent    = d.titulo;
        document.getElementById("art-tag").textContent      = d.tag || "General";
        document.getElementById("art-titulo").textContent   = d.titulo;
        document.getElementById("art-resumen").textContent  = d.resumen || "";
        document.getElementById("art-meta").textContent     = fecha ? "Publicado el " + fecha : "";
        document.getElementById("art-contenido").innerHTML  = d.contenido_html || "";
        document.getElementById("art-loader").style.display = "none";
        document.getElementById("art-body").style.display   = "block";
      }).catch(function() {
        window.location.href = "articulos.html";
      });
    })();
  </script>
</body>
</html>
